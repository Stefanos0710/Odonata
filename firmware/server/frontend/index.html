<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Odonata — Drone cockpit control interface.">
    <title>Odonata · Cockpit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="cockpit">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
            </div>
            <h1>Odonata</h1>
        </div>
        <div class="header-right">
            <div class="action-bar">
                <button id="btn-start-drone" class="btn-primary">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    Start Drone
                </button>
                <button id="btn-stop-drone" class="btn-danger">
                    <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                    Stop Drone
                </button>
                <button id="btn-connect-drone" class="btn-primary" style="background-color: #007bff; border-color: #007bff;">
                    <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                    Connect Drone
                </button>
                <button id="btn-start-flight">
                    <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
                    Start Flight
                </button>
            </div>
            <span id="status-pill" class="status-pill">
                <span class="status-dot"></span>
                Disconnected
            </span>
        </div>
    </header>

    <!-- Two-column dashboard: controls left, video right -->
    <div class="dashboard">

        <!-- Left: all controls -->
        <div class="panel-left">

            <!-- Battery + Servo (side by side) -->
            <div style="display:flex;gap:8px">
                <div class="card" style="flex:1">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
                        Battery
                    </div>
                    <div class="battery-display">
                        <div class="battery-visual">
                            <div id="battery-fill" class="battery-fill" style="width:99%"></div>
                        </div>
                        <div>
                            <div class="battery-pct"><span id="battery-pct">99</span>%</div>
                            <div class="battery-label">Remaining</div>
                        </div>
                    </div>
                </div>
                <div class="card" style="flex:1">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                        Servo Motor
                    </div>
                    <div class="slider-wrap">
                        <input type="range" min="0" max="180" value="90" id="servo-slider">
                        <span class="slider-value"><span id="servo-value">90</span>°</span>
                    </div>
                </div>
            </div>

            <!-- ToF Sensors -->
            <div class="card">
                <div class="card-title">
                    <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm0 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-4.05.5c-.28 0-.5-.22-.5-.5a4.5 4.5 0 0 1 4.5-4.5c.28 0 .5.22.5.5s-.22.5-.5.5A3.5 3.5 0 0 0 3.45 18c0 .28-.22.5-.5.5zM1 18c0-3.31 2.69-6 6-6s6 2.69 6 6h-2c0-2.21-1.79-4-4-4s-4 1.79-4 4H1zm20-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    ToF Sensors
                </div>
                <div class="tof-grid">
                    <div class="tof-item"><span class="tof-label">Front</span><span class="tof-value" id="tof-front">60.43 cm</span></div>
                    <div class="tof-item"><span class="tof-label">Bottom</span><span class="tof-value" id="tof-bottom">60.43 cm</span></div>
                    <div class="tof-item"><span class="tof-label">Left</span><span class="tof-value" id="tof-left">60.43 cm</span></div>
                    <div class="tof-item"><span class="tof-label">Right</span><span class="tof-value" id="tof-right">60.43 cm</span></div>
                </div>
            </div>

            <!-- Motors -->
            <div class="card" style="flex:1">
                <div class="card-title">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z"/></svg>
                    Motor Throttle
                </div>
                <div class="motors-grid">
                    <div class="motor-card">
                        <div class="motor-header"><span class="motor-label">Motor 1</span></div>
                        <div class="motor-row">
                            <input type="number" id="motor1-throttle" min="0" max="10" step="0.5" value="1.0">
                            <button class="btn-sm btn-primary motor-toggle" data-motor="1">Start</button>
                            <button class="btn-sm btn-danger motor-stop" data-motor="1">Stop</button>
                        </div>
                    </div>
                    <div class="motor-card">
                        <div class="motor-header"><span class="motor-label">Motor 2</span></div>
                        <div class="motor-row">
                            <input type="number" id="motor2-throttle" min="0" max="10" step="0.5" value="1.0">
                            <button class="btn-sm btn-primary motor-toggle" data-motor="2">Start</button>
                            <button class="btn-sm btn-danger motor-stop" data-motor="2">Stop</button>
                        </div>
                    </div>
                    <div class="motor-card">
                        <div class="motor-header"><span class="motor-label">Motor 3</span></div>
                        <div class="motor-row">
                            <input type="number" id="motor3-throttle" min="0" max="10" step="0.5" value="1.0">
                            <button class="btn-sm btn-primary motor-toggle" data-motor="3">Start</button>
                            <button class="btn-sm btn-danger motor-stop" data-motor="3">Stop</button>
                        </div>
                    </div>
                    <div class="motor-card">
                        <div class="motor-header"><span class="motor-label">Motor 4</span></div>
                        <div class="motor-row">
                            <input type="number" id="motor4-throttle" min="0" max="10" step="0.5" value="1.0">
                            <button class="btn-sm btn-primary motor-toggle" data-motor="4">Start</button>
                            <button class="btn-sm btn-danger motor-stop" data-motor="4">Stop</button>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /.panel-left -->

        <!-- Right: video stream -->
        <div class="card video-card">
            <div class="video-header">
                <span class="card-title">
                    <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                    Video Stream
                </span>
                <label class="toggle" title="Toggle video stream">
                    <input type="checkbox" id="video-toggle">
                    <span class="toggle-track"></span>
                </label>
            </div>
            <div class="video-container">
                <video id="video-stream" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: contain; display: none;"></video>
                <canvas id="video-canvas" width="640" height="480"></canvas>
                <div id="video-overlay" class="video-off-overlay">
                    <svg viewBox="0 0 24 24"><path d="M21 6.5l-4 4V7c0-.55-.45-1-1-1H9.82L21 17.18V6.5zM3.27 2L2 3.27 4.73 6H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.21 0 .39-.08.55-.18L19.73 21 21 19.73 3.27 2z"/></svg>
                    <span>Video stream is off</span>
                </div>
            </div>
        </div>

    </div><!-- /.dashboard -->

</div><!-- /.cockpit -->

<!-- Connect Drone Modal -->
<div id="connect-modal" class="modal-overlay" style="display: none;">
    <div class="modal">
        <div class="modal-header">
            <h3>Connect Drone</h3>
            <button id="close-modal" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
            <h4>Connected IPs:</h4>
            <ul id="connected-ips-list" class="ip-list">
                <!-- IP list will be injected here -->
            </ul>
            <hr>
            <h4>Manual Input:</h4>
            <div class="manual-ip-input">
                <input type="text" id="manual-ip" placeholder="192.168.1.x">
                <button id="btn-manual-connect" class="btn-primary">Connect</button>
            </div>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
